services:
  postgres:
    image: postgres:16
    container_name: movie_db
    environment:
      POSTGRES_DB: moviereservation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: movie_redis
    ports:
      - "6379:6379"